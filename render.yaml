services:
  - type: web
    name: mpt-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mpt-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: FIRST_ADMIN_EMAIL
        value: admin@mpt.local
      - key: FIRST_ADMIN_PASSWORD
        value: Admin@123
      - key: UPLOAD_DIR
        value: ./uploads
      - key: MAX_UPLOAD_SIZE_MB
        value: "50"
      - key: ALLOWED_ORIGINS
        value: http://localhost:3000

databases:
  - name: mpt-db
    plan: free
    databaseName: mpt_db
    user: mpt_user
