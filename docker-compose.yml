version: '3.9'

services:
  db:
    image: postgres:15-alpine
    container_name: mpt_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mpt_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mpt_secret}
      POSTGRES_DB: ${POSTGRES_DB:-mpt_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mpt_user -d mpt_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mpt_backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://mpt_user:mpt_secret@db:5432/mpt_db
      SECRET_KEY: ${SECRET_KEY:-changeme_super_secret_key_32chars}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      REFRESH_TOKEN_EXPIRE_DAYS: 7
    volumes:
      - ./backend:/app
      - uploads_data:/app/uploads
    ports:
      - "8000:8000"
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mpt_frontend
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  uploads_data:
