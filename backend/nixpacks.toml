[phases.install]
cmds = ["pip install -r requirements.txt"]

[phases.build]
cmds = [
  "python -c \"from app.db.session import engine; from app.db.base import Base; from app.db.init_db import init_db; Base.metadata.drop_all(bind=engine); Base.metadata.create_all(bind=engine); init_db(); print('DB ready')\""
]

[start]
cmd = "uvicorn main:app --host 0.0.0.0 --port ${PORT:-8080}"
