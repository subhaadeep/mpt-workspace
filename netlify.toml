[build]
  base      = "frontend"
  command   = "npm install --legacy-peer-deps && npm run build"
  publish   = ".next"

[build.environment]
  NODE_VERSION = "20"
  NEXT_TELEMETRY_DISABLED = "1"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[[redirects]]
  from   = "/api/*"
  to     = "https://mpt-workspace-production.up.railway.app/api/:splat"
  status = 200
  force  = true
